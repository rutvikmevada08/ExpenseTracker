<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beautiful Responsive Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
    color: #333;
    padding: 40px 15px;
}

.container {
    width: 100%;
    max-width: 850px;
    margin: auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}

h2,
h3 {
    color: #2c3e50;
    margin-bottom: 18px;
    text-align: left;
}

input,
select {
    width: 100%;
    padding: 11px 14px;
    margin-bottom: 15px;
    border: 1px solid #d6d6d6;
    border-radius: 6px;
    font-size: 15px;
    outline: none;
    transition: .2s;
}

input:focus,
select:focus {
    border-color: #0d6efd;
}

button {
    background: #0d6efd;
    color: white;
    border: none;
    padding: 11px;
    width: 100%;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: .2s;
}

button:hover {
    background: #0b5ed7;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: #0d6efd;
    color: white;
    font-weight: 600;
}

th,
td {
    padding: 12px;
    border: 1px solid #e4e4e4;
    text-align: left;
}

tr:nth-child(even) {
    background: #fafafa;
}

tr:hover {
    background: #f1f5ff;
}

.delete-btn {
    background: #dc3545;
    padding: 7px 12px;
    width: auto;
    border-radius: 5px;
}

.delete-btn:hover {
    background: #bb2d3b;
}

.graph-container {
    margin-top: 30px;
    height: 350px;
}

canvas {
    background: white;
}

@media (max-width:768px) {

    .container {
        padding: 18px;
    }

    table {
        font-size: 14px;
    }

    th,
    td {
        padding: 9px;
    }

}
</style>
</head>
<body>
<div class="container">
  <h2 style="text-align:center;">💸 Expense Tracker</h2>
  <input type="text" id="desc" placeholder="Description" />
  <input type="number" id="amount" placeholder="Amount" />
  <select id="category">
    <option value="Food">🍔 Food</option>
    <option value="Transport">🚌 Transport</option>
    <option value="Entertainment">🎬 Entertainment</option>
    <option value="Others">📦 Others</option>
  </select>
  <button onclick="addExpense()">Add Expense</button>
  <h3 style="text-align:center;">🧾 Expenses</h3>
  <div style="overflow-x:auto;">
    <table id="expenseTable">
      <thead>
        <tr>
          <th style="width: 35%;">Description</th>
          <th style="width: 20%;">Amount</th>
          <th style="width: 25%;">Category</th>
          <th style="width: 20%;">Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <h3 style="text-align:center; margin-top:20px;">📊 Expenses by Category</h3>
  <div class="graph-container">
    <canvas id="expenseChart"></canvas>
  </div>
</div>
<script>
let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
function renderExpenses() {
  const tbody = document.querySelector('#expenseTable tbody');
  tbody.innerHTML = '';
  expenses.forEach((exp, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${exp.desc}</td>
      <td>₹${exp.amount.toFixed(2)}</td>
      <td>${exp.category}</td>
      <td><button style='background:#e74c3c;' onclick="deleteExpense(${index})">Delete</button></td>
    `;
    tbody.appendChild(row);
  });
  updateChart();
}
function addExpense() {
  const desc = document.getElementById('desc').value;
  const amount = document.getElementById('amount').value;
  const category = document.getElementById('category').value;
  if(desc && amount && category) {
    expenses.push({ desc, amount: parseFloat(amount), category });
    localStorage.setItem('expenses', JSON.stringify(expenses));
    renderExpenses();
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
  } else {
    alert('Please fill all fields');
  }
}
function deleteExpense(index) {
  expenses.splice(index, 1);
  localStorage.setItem('expenses', JSON.stringify(expenses));
  renderExpenses();
}
let chart;
function updateChart() {
  const categoryTotals = {};
  expenses.forEach(exp => {
    if(categoryTotals[exp.category]) {
      categoryTotals[exp.category] += exp.amount;
    } else {
      categoryTotals[exp.category] = exp.amount;
    }
  });
  const categories = Object.keys(categoryTotals);
  const amounts = Object.values(categoryTotals);
  if(chart) chart.destroy();
  const ctx = document.getElementById('expenseChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: categories,
      datasets: [{
        data: amounts,
        backgroundColor: ['#f39c12', '#2980b9', '#8e44ad', '#27ae60'],
        borderColor: '#fff',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#333',
            font: { size: 14 }
          }
        },
        tooltip: {
          enabled: true,
          backgroundColor: '#333',
          titleFont: { size: 16 },
          bodyFont: { size: 14 }
        }
      }
    }
  });
}
renderExpenses();
</script>
</body>
</html>
