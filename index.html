<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beautiful Responsive Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  box-sizing: border-box;
}
.container {
  background: rgba(255, 255, 255, 0.1);
  padding: 20px;
  margin: 20px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
  width: 90%;
  max-width: 500px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  overflow-wrap: break-word;
  word-wrap: break-word;
}
input, select, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}
button {
  background: #6a11cb;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.3s;
}
button:hover {
  background: #2575fc;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  overflow: hidden;
  table-layout: fixed;
  word-wrap: break-word;
}
th, td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  word-wrap: break-word;
  overflow-wrap: anywhere;
}
th {
  background: rgba(0,0,0,0.3);
}
.graph-container {
  width: 100%;
  height: 300px;
  margin-top: 10px;
}
canvas {
  background: white;
  border-radius: 16px;
  padding: 10px;
  max-width: 100%;
  height: 100% !important;
  box-sizing: border-box;
}
</style>
</head>
<body>
<div class="container">
  <h2 style="text-align:center;">💸 Expense Tracker</h2>
  <input type="text" id="desc" placeholder="Description" />
  <input type="number" id="amount" placeholder="Amount" />
  <select id="category">
    <option value="Food">🍔 Food</option>
    <option value="Transport">🚌 Transport</option>
    <option value="Entertainment">🎬 Entertainment</option>
    <option value="Others">📦 Others</option>
  </select>
  <button onclick="addExpense()">Add Expense</button>
  <h3 style="text-align:center;">🧾 Expenses</h3>
  <div style="overflow-x:auto;">
    <table id="expenseTable">
      <thead>
        <tr>
          <th style="width: 35%;">Description</th>
          <th style="width: 20%;">Amount</th>
          <th style="width: 25%;">Category</th>
          <th style="width: 20%;">Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <h3 style="text-align:center; margin-top:20px;">📊 Expenses by Category</h3>
  <div class="graph-container">
    <canvas id="expenseChart"></canvas>
  </div>
</div>
<script>
let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
function renderExpenses() {
  const tbody = document.querySelector('#expenseTable tbody');
  tbody.innerHTML = '';
  expenses.forEach((exp, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${exp.desc}</td>
      <td>₹${exp.amount.toFixed(2)}</td>
      <td>${exp.category}</td>
      <td><button style='background:#e74c3c;' onclick="deleteExpense(${index})">Delete</button></td>
    `;
    tbody.appendChild(row);
  });
  updateChart();
}
function addExpense() {
  const desc = document.getElementById('desc').value;
  const amount = document.getElementById('amount').value;
  const category = document.getElementById('category').value;
  if(desc && amount && category) {
    expenses.push({ desc, amount: parseFloat(amount), category });
    localStorage.setItem('expenses', JSON.stringify(expenses));
    renderExpenses();
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
  } else {
    alert('Please fill all fields');
  }
}
function deleteExpense(index) {
  expenses.splice(index, 1);
  localStorage.setItem('expenses', JSON.stringify(expenses));
  renderExpenses();
}
let chart;
function updateChart() {
  const categoryTotals = {};
  expenses.forEach(exp => {
    if(categoryTotals[exp.category]) {
      categoryTotals[exp.category] += exp.amount;
    } else {
      categoryTotals[exp.category] = exp.amount;
    }
  });
  const categories = Object.keys(categoryTotals);
  const amounts = Object.values(categoryTotals);
  if(chart) chart.destroy();
  const ctx = document.getElementById('expenseChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: categories,
      datasets: [{
        data: amounts,
        backgroundColor: ['#f39c12', '#2980b9', '#8e44ad', '#27ae60'],
        borderColor: '#fff',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#333',
            font: { size: 14 }
          }
        },
        tooltip: {
          enabled: true,
          backgroundColor: '#333',
          titleFont: { size: 16 },
          bodyFont: { size: 14 }
        }
      }
    }
  });
}
renderExpenses();
</script>
</body>
</html>
